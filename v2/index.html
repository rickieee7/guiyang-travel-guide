<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C41E3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="随行">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>随行 · 旅行规划</title>
<style>
:root {
  --red: #C41E3A; --red-light: #FDE8EC;
  --bg: #FFF8F0; --surface: #FFFFFF;
  --text: #2D2D2D; --subtext: #6B6B6B;
  --border: #E8DDD4; --green: #059669; --amber: #F59E0B;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 12px; --bottom-bar-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.6;
  max-width: 480px; margin: 0 auto; min-height: 100vh;
  padding-bottom: calc(var(--bottom-bar-h) + env(safe-area-inset-bottom, 0px));
}
/* === Shared components === */
.card { background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:12px; box-shadow:var(--shadow); }
.card h3 { font-size:15px; margin-bottom:8px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
.badge-danger { background:#FEE2E2; color:#B91C1C; }
.badge-warn { background:#FEF3C7; color:#92400E; }
/* === Page containers === */
.page { display:none; padding:12px 16px; }
.page.active { display:block; }
/* === Bottom bar === */
.bottom-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  max-width:480px; width:100%; background:var(--surface);
  display:flex; justify-content:space-around; align-items:center;
  height:var(--bottom-bar-h); border-top:1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index:100;
}
.bottom-bar .bb-item {
  text-align:center; font-size:10px; color:var(--subtext);
  padding:4px 12px; cursor:pointer; transition:color 0.2s;
}
.bottom-bar .bb-item.active { color:var(--red); font-weight:600; }
.bottom-bar .bb-item .bb-icon { font-size:20px; display:block; }
/* === Date tabs === */
.date-tabs { display:flex; overflow-x:auto; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
.date-tabs button { flex:1 0 auto; min-width:25%; padding:10px 6px; border:none; background:none; font-size:12px; color:var(--subtext); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.date-tabs button.active { color:var(--red); border-bottom-color:var(--red); font-weight:600; }
/* === Timeline item === */
.tl-item { display:flex; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
.tl-time { width:42px; text-align:right; font-size:12px; font-weight:600; color:var(--red); flex-shrink:0; }
.tl-body { flex:1; font-size:13px; }
.tl-note { font-size:11px; color:var(--subtext); }
.tl-check { width:22px; height:22px; border:2px solid var(--border); border-radius:50%; flex-shrink:0; cursor:pointer; transition:all 0.2s; }
.tl-check.done { background:var(--green); border-color:var(--green); }
.tl-check.done::after { content:"✓"; color:#fff; font-size:12px; display:flex; justify-content:center; align-items:center; height:100%; }
.tl-item.done .tl-body { text-decoration:line-through; opacity:0.5; }
/* === Anchor card === */
.anchor-card { border-radius:10px; padding:12px; margin-bottom:6px; display:flex; gap:10px; align-items:center; }
.anchor-flight { background:#FDE8EC; }
.anchor-event { background:#EDE9FE; }
.anchor-train { background:#E0F2FE; }
/* === Compare grid (Plan B) === */
.compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.compare-old { background:#F3F4F6; border-radius:10px; padding:10px; font-size:12px; }
.compare-new { background:#ECFDF5; border-radius:10px; padding:10px; font-size:12px; border:1px solid #6EE7B7; }
.compare-label { font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
.compare-old .compare-label { color:#9CA3AF; }
.compare-new .compare-label { color:var(--green); }
/* === Impact badge === */
.impact-row { display:flex; gap:8px; padding:6px 0; font-size:12px; border-bottom:1px solid var(--border); align-items:center; }
.impact-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; flex-shrink:0; }
.impact-bad { background:#FEE2E2; color:#B91C1C; }
.impact-ok { background:#ECFDF5; color:var(--green); }
.impact-warn { background:#FEF3C7; color:#92400E; }
/* === Drag sort === */
.sort-item { background:var(--surface); border-radius:10px; padding:14px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; cursor:grab; border:1px solid var(--border); transition:border-color 0.2s; }
.sort-item:active { cursor:grabbing; border-color:var(--red); }
.sort-handle { color:var(--subtext); font-size:12px; user-select:none; }
/* === Search === */
.search-box { background:var(--surface); border-radius:10px; padding:10px 12px; margin-bottom:12px; display:flex; gap:8px; align-items:center; border:1px solid var(--border); }
.search-box input { border:none; flex:1; font-size:14px; outline:none; background:transparent; }
/* === Alert bar === */
.alert-bar { margin:10px 16px; padding:12px; border-radius:10px; font-size:12px; display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
.alert-warn { background:linear-gradient(135deg,#FEF3C7,#FDE68A); border-left:4px solid var(--amber); }
.alert-danger { background:linear-gradient(135deg,#FEE2E2,#FECACA); border-left:4px solid #DC2626; }
/* === Button styles === */
.btn-primary { background:var(--red); color:#fff; border:none; padding:12px 32px; border-radius:24px; font-size:15px; font-weight:600; cursor:pointer; }
.btn-outline { background:transparent; color:var(--red); border:1px solid var(--red); padding:10px 28px; border-radius:24px; font-size:14px; cursor:pointer; }
.btn-ghost { background:transparent; color:var(--subtext); border:none; font-size:13px; cursor:pointer; }
/* === Plan B option card === */
.pb-option { border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer; transition:border-color 0.2s; }
.pb-option.selected { border:2px solid var(--red); background:var(--red-light); }
.pb-option.recommended { border-color:var(--green); }
/* === Settings === */
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
.setting-row:last-child { border-bottom:none; }
.toggle-switch { width:44px; height:24px; background:#E5E7EB; border-radius:12px; cursor:pointer; position:relative; transition:background 0.3s; }
.toggle-switch.on { background:var(--green); }
.toggle-switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform 0.3s; }
.toggle-switch.on::after { transform:translateX(20px); }
/* === Food area card === */
.food-area-card { background:var(--surface); border-radius:var(--radius); padding:12px; margin-bottom:12px; box-shadow:var(--shadow); }
.food-area-card h3 { font-size:15px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.food-area-card .food-row-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
.food-area-card .food-row-item:last-child { border-bottom:none; }
.food-row-name { font-size:14px; font-weight:600; flex:1; }
.food-row-detail { font-size:11px; color:var(--subtext); }
.nav-pill { display:inline-flex; align-items:center; gap:3px; background:var(--red); color:#fff; padding:5px 12px; border-radius:14px; font-size:12px; font-weight:600; text-decoration:none; flex-shrink:0; margin-left:8px; transition:opacity 0.15s; }
.nav-pill:active { opacity:0.7; }
.area-anchor { scroll-margin-top: 70px; }
@media (min-width:768px) { body { max-width:720px; } }
</style>
</head>
<body>

<!-- ===== 时间线页 ===== -->
<div class="page active" id="page-timeline">
  <div class="date-tabs" id="dateTabs"></div>
  <div id="alertBar"></div>
  <div id="timeline"></div>
</div>

<!-- ===== Plan B 页 ===== -->
<div class="page" id="page-planb">
  <div class="card"><h3>🔄 Plan B</h3><div id="planbContent"></div></div>
</div>

<!-- ===== 设置页 ===== -->
<div class="page" id="page-settings">
  <div class="card"><h3>🎯 旅行偏好</h3><div id="prefSort"></div></div>
  <div class="card"><h3>📅 硬约束</h3><div id="anchorList"></div></div>
  <div class="card"><h3>📍 收藏夹</h3><div id="pinList"></div><div id="searchAdd"></div></div>
  <div class="card"><div class="setting-row"><span>✅ 完成勾选</span><div class="toggle-switch on" id="toggleCheck" onclick="this.classList.toggle('on')"></div></div></div>
</div>

<!-- ===== 美食页 ===== -->
<div class="page" id="page-food">
  <div id="foodByArea"></div>
</div>

<!-- ===== 时间线底部栏 ===== -->
<div class="bottom-bar" id="bar-timeline">
  <div class="bb-item active" onclick="switchPage('page-timeline')"><span class="bb-icon">📅</span>时间线</div>
  <div class="bb-item" onclick="switchPage('page-food')"><span class="bb-icon">🍜</span>美食</div>
  <div class="bb-item" onclick="switchPage('page-planb')"><span class="bb-icon">🔄</span>Plan B</div>
  <div class="bb-item" onclick="switchPage('page-settings')"><span class="bb-icon">⚙️</span>设置</div>
</div>

<!-- ===== 美食页底部栏 ===== -->
<div class="bottom-bar" id="bar-food" style="display:none;">
  <div class="bb-item" onclick="switchPage('page-timeline')"><span class="bb-icon">↩</span>返回时间线</div>
  <div class="bb-item" onclick="scrollToArea('huguo')"><span class="bb-icon">🔥</span>护国路</div>
  <div class="bb-item" onclick="scrollToArea('minsheng')"><span class="bb-icon">📍</span>民生路</div>
  <div class="bb-item" onclick="scrollToArea('penshuichi')"><span class="bb-icon">🏙️</span>喷水池</div>
</div>

<!-- ===== Plan B 底部栏 ===== -->
<div class="bottom-bar" id="bar-planb" style="display:none;">
  <div class="bb-item" onclick="switchPage('page-timeline')"><span class="bb-icon">↩</span>返回时间线</div>
  <div class="bb-item active" onclick="regeneratePlanB()"><span class="bb-icon">🔄</span>重新推演</div>
</div>

<!-- ===== 设置底部栏 ===== -->
<div class="bottom-bar" id="bar-settings" style="display:none;">
  <div class="bb-item" onclick="switchPage('page-timeline')"><span class="bb-icon">↩</span>返回时间线</div>
  <div class="bb-item" onclick="saveAndRegenerate()"><span class="bb-icon">⚡</span>保存并重新生成</div>
</div>

<script src="js/data.js?v=3"></script>
<script src="js/engine.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
