<title>随行 · 旅行规划</title>
<style>
:root {
  --red: #C41E3A; --red-light: #FDE8EC;
  --bg: #FFF8F0; --surface: #FFFFFF;
  --text: #2D2D2D; --subtext: #6B6B6B;
  --border: #E8DDD4; --green: #059669; --amber: #F59E0B;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 12px; --bottom-bar-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.6;
  max-width: 480px; margin: 0 auto; min-height: 100vh;
  padding-bottom: calc(var(--bottom-bar-h) + env(safe-area-inset-bottom, 0px));
}
/* === Shared components === */
.card { background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:12px; box-shadow:var(--shadow); }
.card h3 { font-size:15px; margin-bottom:8px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
.badge-danger { background:#FEE2E2; color:#B91C1C; }
.badge-warn { background:#FEF3C7; color:#92400E; }
/* === Page containers === */
.page { display:none; padding:12px 16px; }
.page.active { display:block; }
/* === Bottom bar === */
.bottom-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  max-width:480px; width:100%; background:var(--surface);
  display:flex; justify-content:space-around; align-items:center;
  height:var(--bottom-bar-h); border-top:1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index:100;
}
.bottom-bar .bb-item {
  text-align:center; font-size:10px; color:var(--subtext);
  padding:4px 12px; cursor:pointer; transition:color 0.2s;
}
.bottom-bar .bb-item.active { color:var(--red); font-weight:600; }
.bottom-bar .bb-item .bb-icon { font-size:20px; display:block; }
/* === Date tabs === */
.date-tabs { display:flex; overflow-x:auto; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
.date-tabs button { flex:1 0 auto; min-width:25%; padding:10px 6px; border:none; background:none; font-size:12px; color:var(--subtext); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.date-tabs button.active { color:var(--red); border-bottom-color:var(--red); font-weight:600; }
/* === Timeline item === */
.tl-item { display:flex; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
.tl-time { width:42px; text-align:right; font-size:12px; font-weight:600; color:var(--red); flex-shrink:0; }
.tl-body { flex:1; font-size:13px; }
.tl-note { font-size:11px; color:var(--subtext); }
.tl-check { width:22px; height:22px; border:2px solid var(--border); border-radius:50%; flex-shrink:0; cursor:pointer; transition:all 0.2s; }
.tl-check.done { background:var(--green); border-color:var(--green); }
.tl-check.done::after { content:"✓"; color:#fff; font-size:12px; display:flex; justify-content:center; align-items:center; height:100%; }
.tl-item.done .tl-body { text-decoration:line-through; opacity:0.5; }
/* === Anchor card === */
.anchor-card { border-radius:10px; padding:12px; margin-bottom:6px; display:flex; gap:10px; align-items:center; }
.anchor-flight { background:#FDE8EC; }
.anchor-event { background:#EDE9FE; }
.anchor-train { background:#E0F2FE; }
/* === Compare grid (Plan B) === */
.compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.compare-old { background:#F3F4F6; border-radius:10px; padding:10px; font-size:12px; }
.compare-new { background:#ECFDF5; border-radius:10px; padding:10px; font-size:12px; border:1px solid #6EE7B7; }
.compare-label { font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
.compare-old .compare-label { color:#9CA3AF; }
.compare-new .compare-label { color:var(--green); }
/* === Impact badge === */
.impact-row { display:flex; gap:8px; padding:6px 0; font-size:12px; border-bottom:1px solid var(--border); align-items:center; }
.impact-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; flex-shrink:0; }
.impact-bad { background:#FEE2E2; color:#B91C1C; }
.impact-ok { background:#ECFDF5; color:var(--green); }
.impact-warn { background:#FEF3C7; color:#92400E; }
/* === Drag sort === */
.sort-item { background:var(--surface); border-radius:10px; padding:14px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; cursor:grab; border:1px solid var(--border); transition:border-color 0.2s; }
.sort-item:active { cursor:grabbing; border-color:var(--red); }
.sort-handle { color:var(--subtext); font-size:12px; user-select:none; }
/* === Search === */
.search-box { background:var(--surface); border-radius:10px; padding:10px 12px; margin-bottom:12px; display:flex; gap:8px; align-items:center; border:1px solid var(--border); }
.search-box input { border:none; flex:1; font-size:14px; outline:none; background:transparent; }
/* === Alert bar === */
.alert-bar { margin:10px 16px; padding:12px; border-radius:10px; font-size:12px; display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
.alert-warn { background:linear-gradient(135deg,#FEF3C7,#FDE68A); border-left:4px solid var(--amber); }
.alert-danger { background:linear-gradient(135deg,#FEE2E2,#FECACA); border-left:4px solid #DC2626; }
/* === Button styles === */
.btn-primary { background:var(--red); color:#fff; border:none; padding:12px 32px; border-radius:24px; font-size:15px; font-weight:600; cursor:pointer; }
.btn-outline { background:transparent; color:var(--red); border:1px solid var(--red); padding:10px 28px; border-radius:24px; font-size:14px; cursor:pointer; }
.btn-ghost { background:transparent; color:var(--subtext); border:none; font-size:13px; cursor:pointer; }
/* === Plan B option card === */
.pb-option { border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer; transition:border-color 0.2s; }
.pb-option.selected { border:2px solid var(--red); background:var(--red-light); }
.pb-option.recommended { border-color:var(--green); }
/* === Settings === */
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
.setting-row:last-child { border-bottom:none; }
.toggle-switch { width:44px; height:24px; background:#E5E7EB; border-radius:12px; cursor:pointer; position:relative; transition:background 0.3s; }
.toggle-switch.on { background:var(--green); }
.toggle-switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform 0.3s; }
.toggle-switch.on::after { transform:translateX(20px); }
/* === Food area card === */
.food-area-card { background:var(--surface); border-radius:var(--radius); padding:12px; margin-bottom:12px; box-shadow:var(--shadow); }
.food-area-card h3 { font-size:15px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.food-area-card .food-row-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
.food-area-card .food-row-item:last-child { border-bottom:none; }
.food-row-name { font-size:14px; font-weight:600; flex:1; }
.food-row-detail { font-size:11px; color:var(--subtext); }
.nav-pill { display:inline-flex; align-items:center; gap:3px; background:var(--red); color:#fff; padding:5px 12px; border-radius:14px; font-size:12px; font-weight:600; text-decoration:none; flex-shrink:0; margin-left:8px; transition:opacity 0.15s; }
.nav-pill:active { opacity:0.7; }
.area-anchor { scroll-margin-top: 70px; }
@media (min-width:768px) { body { max-width:720px; } }
</style>
</head>

// ===== 工具 =====

function distanceKm(a, b) {
  var R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  var x = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function getDateRange() {
  if (!trip.startDate || !trip.endDate) return [];
  var dates = [], sp = trip.startDate.split("-").map(Number), ep = trip.endDate.split("-").map(Number);
  var d = new Date(sp[0], sp[1]-1, sp[2]), end = new Date(ep[0], ep[1]-1, ep[2]);
  while (d <= end) {
    var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
    dates.push(y + "-" + m + "-" + day); d.setDate(d.getDate()+1);
  }
  return dates;
}

function timeAdd(t, mins) {
  var p = t.split(":"), total = parseInt(p[0])*60 + parseInt(p[1]) + mins;
  total = Math.max(0, Math.min(total, 1439));
  return String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
}

function timeBefore(t1, t2) { return t1 < t2; }

function findPin(id) { return (trip.pins||[]).find(function(p) { return p.id === id; }); }
function findAnchor(id) { return (trip.anchors||[]).find(function(a) { return a.id === id; }); }

function addItem(items, time, event, note, opts) {
  opts = opts || {};
  items.push({ time: time, event: event, note: note || "", type: opts.type || "system",
    pinId: opts.pinId || null, anchorId: opts.anchorId || null,
    lat: opts.lat || null, lng: opts.lng || null, done: false });
}

// ===== Plan B =====
var _backupPlans = null;
function backupCurrentPlan() { _backupPlans = JSON.parse(JSON.stringify(trip.dailyPlans)); }
function restoreBackupPlan() { if (_backupPlans) { trip.dailyPlans = _backupPlans; _backupPlans = null; } }

function deducePlanB(problemPinId, reason) {
  var problemPin = findPin(problemPinId);
  if (!problemPin) return null;

  var dates = getDateRange();
  var affectedDays = [];
  dates.forEach(function(d) {
    var plan = trip.dailyPlans[d];
    if (plan && plan.items.some(function(it) { return it.pinId === problemPinId; })) affectedDays.push(d);
  });

  // 找同类型在贵阳的替代
  var alternatives = (trip.pins||[]).filter(function(p) {
    return p.id !== problemPinId && p.type !== "food" && p.type !== "reminder" && p.city === "贵阳" && p.available !== false;
  });
  alternatives.sort(function(a,b) { return (b.type==="nature"?3:b.type==="culture"?2:1) - (a.type==="nature"?3:a.type==="culture"?2:1); });

  var results = alternatives.slice(0, 4).map(function(alt, idx) {
    return {
      score: Math.round(90 - idx * 12),
      label: alt.name,
      plan: JSON.parse(JSON.stringify(trip.dailyPlans)),
      altId: alt.id, altPin: alt, inCity: true
    };
  });

  return {
    problem: problemPin, reason: reason, affectedDays: affectedDays,
    affectedPins: [],
    alternatives: results
  };
}

  // 切换底部栏
  ['bar-timeline','bar-planb','bar-settings','bar-food'].forEach(function(id) {
    document.getElementById(id).style.display = 'none';
  });
  if (pageId === 'page-timeline') document.getElementById('bar-timeline').style.display = 'flex';
  if (pageId === 'page-planb') document.getElementById('bar-planb').style.display = 'flex';
  if (pageId === 'page-settings') document.getElementById('bar-settings').style.display = 'flex';
  if (pageId === 'page-food') document.getElementById('bar-food').style.display = 'flex';
  // 渲染对应页
  if (pageId === 'page-timeline') renderTimelinePage();
  if (pageId === 'page-planb') renderPlanBPage();
  if (pageId === 'page-settings') renderSettingsPage();
  if (pageId === 'page-food') renderFoodPage();
}

  }).join('');
  document.getElementById('dateTabs').innerHTML = tabHtml;

  // 预警条
  renderAlertBar(dates[currentDayIdx]);

  // 时间线
  renderDayTimeline(dates[currentDayIdx]);
}

function selectDay(idx) {
  currentDayIdx = idx;
  renderTimelinePage();
}

function renderAlertBar(dateStr) {
  var plan = trip.dailyPlans[dateStr];
  var items = plan ? plan.items : [];
  var hasRainRisk = items.some(function(it) { return it.pinId === 'p02'; }); // 荔波有暴雨风险
  var el = document.getElementById('alertBar');
  if (hasRainRisk) {
    el.innerHTML = '<div class="alert-bar alert-warn" onclick="switchPage(\'page-planb\')">'
      + '<span>🌧️</span><div><strong>暴雨预警</strong> · 荔波可能关闭 · <span style="color:var(--red);">查看Plan B →</span></div></div>';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function renderDayTimeline(dateStr) {
  var plan = trip.dailyPlans[dateStr];
  var items = plan ? plan.items : [];
  var showCheck = document.getElementById('toggleCheck').classList.contains('on');

  var html = '';
  if (items.length === 0) {
    html = '<div class="card"><p style="text-align:center;color:var(--subtext);padding:20px;">这天还没有安排</p></div>';
  } else {
    html = '<div class="card">';
    html += '<h3>📅 ' + formatDateLabel(dateStr) + '</h3>';
    items.forEach(function(it, i) {
      html += '<div class="tl-item' + (it.done ? ' done' : '') + '">';
      html += '<div class="tl-time">' + it.time + '</div>';
      html += '<div class="tl-body">' + it.event;
      if (it.note) html += '<div class="tl-note">' + it.note + '</div>';
      html += '</div>';
      if (it.lat) html += '<a class="nav-pill" style="align-self:center;margin-left:4px;" href="' + buildNavUrl(it.lat, it.lng, it.event) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍</a>';
      if (showCheck) {
        html += '<div class="tl-check' + (it.done ? ' done' : '') + '" onclick="toggleCheck(' + i + ')"></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  document.getElementById('timeline').innerHTML = html;
}

function toggleCheck(idx) {
  var dates = getDateRange();
  var plan = trip.dailyPlans[dates[currentDayIdx]];
  if (!plan || !plan.items[idx]) return;
  plan.items[idx].done = !plan.items[idx].done;
  saveTrip();
  renderDayTimeline(dates[currentDayIdx]);
}

function formatDateLabel(dateStr) {
  var parts = dateStr.split("-").map(Number);
  var d = new Date(parts[0], parts[1]-1, parts[2]);
  var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return (d.getMonth()+1) + '月' + d.getDate() + '日 · ' + weekdays[d.getDay()];
}

// ===== Plan B 页 =====
var currentPlanB = null;

function renderPlanBPage() {
  var el = document.getElementById('planbContent');
  if (!currentPlanB) {
    // 没有触发 Plan B → 显示入口
    el.innerHTML = '<p style="text-align:center;color:var(--subtext);padding:20px;">'
      + '这里会在出问题时帮你推演替代方案<br><br>'
      + '你可以手动触发：</p>'
      + '<div style="text-align:center;margin-top:12px;">'
      + '<button class="btn-primary" onclick="manualTriggerPlanB()">🔄 模拟触发（荔波暴雨）</button>'
      + '</div>';
    return;
  }

  var pb = currentPlanB;
  var html = '';

  // 触发原因
  html += '<div style="background:#FEE2E2;border-radius:10px;padding:12px;margin-bottom:12px;">'
    + '<strong>🌧️ 触发：' + pb.reason + '</strong></div>';

  // 影响范围
  html += '<p style="font-weight:600;font-size:13px;margin-bottom:6px;">📋 影响分析</p>';
  html += '<div class="impact-row"><span class="impact-badge impact-bad">❌ 无法执行</span>' + pb.problem.name + '</div>';
  pb.affectedPins.slice(0,3).forEach(function(pin) {
    html += '<div class="impact-row"><span class="impact-badge impact-warn">⚠ 需调整</span>' + (pin.event||'') + '</div>';
  });
  html += '<div style="margin:12px 0;"></div>';

  // 方案列表
  (pb.alternatives||[]).slice(0,3).forEach(function(alt, i) {
    var isRec = i === 0;
    html += '<div class="pb-option' + (isRec ? ' recommended' : '') + '" onclick="selectPlanB(' + i + ')">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    html += '<strong>' + (i===0?'🥇':'🥈') + ' 方案' + (['A','B','C'][i]||'') + '：' + alt.label + '</strong>';
    html += '<span style="font-size:12px;color:var(--subtext);">匹配度 ' + alt.score + '%</span></div>';

    // 每日新旧对比
    var dates = getDateRange();
    html += '<div class="compare-grid">';
    dates.forEach(function(d) {
      var oldItems = (trip.dailyPlans[d]||{}).items||[];
      var newItems = (alt.plan[d]||{}).items||[];
      var changed = JSON.stringify(oldItems) !== JSON.stringify(newItems);
      if (!changed) return; // 无变化的天不展示
      html += '<div class="compare-old"><div class="compare-label">' + formatDateLabel(d) + ' 原计划</div>';
      oldItems.forEach(function(it) { html += '<div style="font-size:11px;padding:1px 0;">' + it.time + ' ' + it.event + '</div>'; });
      html += '</div>';
      html += '<div class="compare-new"><div class="compare-label">方案' + (['A','B','C'][i]||'') + '</div>';
      newItems.forEach(function(it) { html += '<div style="font-size:11px;padding:1px 0;">' + it.time + ' ' + it.event + '</div>'; });
      html += '</div>';
    });
    html += '</div>';

    html += '<div style="text-align:right;">';
    html += '<button class="btn-primary" style="font-size:13px;padding:8px 20px;">接受此方案</button> ';
    html += '</div>';
    html += '</div>';
  });

  // 重新生成入口
  html += '<div style="text-align:center;margin-top:16px;">';
  html += '<button class="btn-outline" onclick="regeneratePlanB()">🔄 根据新要求重新推演</button> ';
  html += '<button class="btn-ghost" onclick="cancelPlanB()">← 切回原计划</button>';
  html += '</div>';

  el.innerHTML = html;
}

function manualTriggerPlanB() {
  backupCurrentPlan();
  currentPlanB = deducePlanB('p02', '荔波暴雨 · 景区关闭');
  renderPlanBPage();
}

function selectPlanB(idx) {
  if (!currentPlanB || !currentPlanB.alternatives[idx]) return;
  trip.dailyPlans = currentPlanB.alternatives[idx].plan;
  currentPlanB = null;
  saveTrip();
  switchPage('page-timeline');
}

function cancelPlanB() {
  restoreBackupPlan();
  currentPlanB = null;
  saveTrip();
  switchPage('page-timeline');
}

function regeneratePlanB() {
  // 允许用户输入新要求
  var req = prompt('你想调整什么？（比如：不去夜郎谷 / 更慢节奏 / 侧重拍照）');
  if (!req) return;
  // 简单处理：重新推演
  if (currentPlanB) {
    currentPlanB = deducePlanB(currentPlanB.problem.id, req);
    renderPlanBPage();
  }
}

// ===== 设置页 =====
function renderSettingsPage() {
  // 偏好排序
  var prefHtml = (trip.preferences||[]).map(function(p, i) {
    return '<div class="sort-item" draggable="true" data-idx="' + i + '">'
      + '<span>' + p.emoji + ' ' + p.label + '</span>'
      + '<span class="sort-handle">═══</span></div>';
  }).join('');
  document.getElementById('prefSort').innerHTML = prefHtml;

  // 硬约束
  var anchorHtml = (trip.anchors||[]).map(function(a) {
    var cls = a.type === 'flight' ? 'anchor-flight' : a.type === 'event' ? 'anchor-event' : 'anchor-train';
    return '<div class="anchor-card ' + cls + '">'
      + '<span style="font-size:24px;">' + a.icon + '</span>'
      + '<div style="flex:1;"><strong>' + a.title + '</strong>'
      + '<div style="font-size:12px;color:var(--subtext);">' + a.datetime.slice(0,16).replace('T',' ') + ' · ' + a.location + '</div></div>'
      + '<span style="font-size:12px;color:var(--subtext);cursor:pointer;" onclick="removeAnchor(\'' + a.id + '\')">✕</span>'
      + '</div>';
  }).join('');
  anchorHtml += '<div style="text-align:center;margin-top:8px;"><button class="btn-outline" style="font-size:13px;padding:8px 20px;" onclick="addAnchor()">+ 添加硬约束</button></div>';
  document.getElementById('anchorList').innerHTML = anchorHtml;

  // 收藏夹
  var pinHtml = (trip.pins||[]).slice(0, 15).map(function(p) {
    return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">'
      + '<span>' + (p.type==='nature'?'🌊':p.type==='food'?'🍜':p.type==='culture'?'🏛️':'📸') + ' ' + p.name + '</span>'
      + '<span style="font-size:11px;color:var(--subtext);">' + p.area + '</span></div>';
  }).join('');
  document.getElementById('pinList').innerHTML = pinHtml || '<p style="color:var(--subtext);text-align:center;">暂无收藏</p>';

  // 搜索框
  document.getElementById('searchAdd').innerHTML = '<div class="search-box">'
    + '<span>🔍</span><input placeholder="搜索地名/店名添加到收藏夹..." id="searchInput" onkeydown="if(event.key===\'Enter\')searchAddPin()">'
    + '</div><div id="searchResults"></div>';
}

// 简化版搜索（从默认 pins 中匹配）
function searchAddPin() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  if (!q) return;
  var results = DEFAULT_PINS.filter(function(p) {
    return p.name.toLowerCase().indexOf(q) >= 0 || p.area.toLowerCase().indexOf(q) >= 0;
  }).slice(0, 6);
  document.getElementById('searchResults').innerHTML = results.map(function(p) {
    return '<div style="padding:8px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;"'
      + ' onclick="addPin(\'' + p.id + '\')">'
      + (p.type==='nature'?'🌊':p.type==='food'?'🍜':p.type==='culture'?'🏛️':'📸')
      + ' <strong>' + p.name + '</strong>'
      + '<span style="font-size:11px;color:var(--subtext);"> · ' + p.area + '</span>'
      + ' <span style="color:var(--red);float:right;">+ 收藏</span></div>';
  }).join('');
}

function addPin(pinId) {
  var existing = (trip.pins||[]).find(function(p) { return p.id === pinId; });
  if (existing) { alert('已收藏过了'); return; }
  var pin = DEFAULT_PINS.find(function(p) { return p.id === pinId; });
  if (pin) { trip.pins.push(Object.assign({}, pin)); saveTrip(); renderSettingsPage(); }
}

// ===== 地图导航 =====
function buildNavUrl(lat, lng, label) {
  var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  if (isIOS) return 'https://maps.apple.com/?ll=' + lat + ',' + lng + '&q=' + encodeURIComponent(label);
  return 'https://uri.amap.com/marker?position=' + lng + ',' + lat + '&name=' + encodeURIComponent(label) + '&callnative=1';
}

// ===== 美食按片区分页 =====
var FOOD_AREAS = [
  { key:"minsheng", name:"民生路 + 正新街", emoji:"🍢",
    filter: function(f) { return f.area.indexOf("民生路")>=0 || f.area.indexOf("正新街")>=0; } },
  { key:"caijia", name:"蔡家街", emoji:"🍜",
    filter: function(f) { return f.area.indexOf("蔡家街")>=0; } },
  { key:"huguo", name:"护国路", emoji:"🔥",
    filter: function(f) { return f.area.indexOf("护国路")>=0; } },
  { key:"penshuichi", name:"喷水池 + 太平路 + 国贸", emoji:"🏙️",
    filter: function(f) { return f.area.indexOf("喷水池")>=0 || f.area.indexOf("太平路")>=0 || f.area.indexOf("国贸")>=0; } },
  { key:"dananmen", name:"大南门", emoji:"🥢",
    filter: function(f) { return f.area.indexOf("大南门")>=0; } },
  { key:"shengfu", name:"省府路", emoji:"🍲",
    filter: function(f) { return f.area.indexOf("省府路")>=0; } },
  { key:"youyi", name:"友谊路 + 虎门巷 + 陕西路", emoji:"🍖",
    filter: function(f) { return f.area.indexOf("友谊路")>=0 || f.area.indexOf("虎门巷")>=0 || f.area.indexOf("陕西路")>=0; } },
  { key:"other", name:"其他美食", emoji:"🍳",
    filter: function(f) { return f.area.indexOf("八鸽岩路")>=0 || f.area.indexOf("飞山街")>=0 || f.area.indexOf("黔灵东路")>=0 || f.area.indexOf("文昌路")>=0; } }
];

function getFoodPriority(f) {
  var pri = (f.note||"").indexOf("🥇必吃") >= 0 ? 1 : (f.note||"").indexOf("🥈精选") >= 0 ? 2 : 3;
  return pri;
}

function renderFoodPage() {
  var foods = (trip.pins||[]).filter(function(p) { return p.type === "food"; });
  if (foods.length === 0) { document.getElementById("foodByArea").innerHTML = '<div class="card"><p style="text-align:center;color:var(--subtext);padding:20px;">暂无美食收藏</p></div>'; return; }

  var html = '';
  FOOD_AREAS.forEach(function(area) {
    var areaFoods = foods.filter(area.filter);
    if (areaFoods.length === 0) return;

    // 排序：必吃 > 精选 > 备选
    areaFoods.sort(function(a,b) { return getFoodPriority(a) - getFoodPriority(b); });

    html += '<div class="food-area-card area-anchor" id="area-' + area.key + '">';
    html += '<h3>' + area.emoji + ' ' + area.name + ' <span style="font-size:11px;color:var(--subtext);font-weight:400;">' + areaFoods.length + '家</span></h3>';

    areaFoods.forEach(function(f) {
      var url = buildNavUrl(f.lat, f.lng, f.name);
      var priorityLabel = getFoodPriority(f) === 1 ? '🥇必吃' : getFoodPriority(f) === 2 ? '🥈精选' : '🥉备选';
      html += '<div class="food-row-item">';
      html += '<div style="flex:1;min-width:0;">';
      html += '<div class="food-row-name">' + priorityLabel + ' ' + f.name + '</div>';
      var detail = (f.note||'').replace(/🥇必吃[ ·]*|🥈精选[ ·]*|🥉备选[ ·]*/g,'');
      if (f.price) detail += (detail?' · ':'') + f.price;
      html += '<div class="food-row-detail">' + (detail || f.timeHint || '') + '</div>';
      html += '</div>';
      html += '<a class="nav-pill" href="' + url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 导航 ↗</a>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById("foodByArea").innerHTML = html;
}

function scrollToArea(key) {
  var el = document.getElementById("area-" + key);
  if (el) el.scrollIntoView({ behavior: "smooth" });
}

// js/app.js — 启动 + 持久化

function loadTrip() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      trip = JSON.parse(raw);
      return;
    }
  } catch(e) {}
  // 无数据 → 加载 Demo
  trip = {
    title: "贵阳四日旅行 · Demo",
    startDate: "2026-07-02",
    endDate: "2026-07-05",
    preferences: JSON.parse(JSON.stringify(DEFAULT_PREFERENCES)),
    anchors: JSON.parse(JSON.stringify(DEFAULT_ANCHORS)),
    pins: JSON.parse(JSON.stringify(DEFAULT_PINS)),
    dailyPlans: {}
  };
  generateTimeline();
  saveTrip();
}

// ===== 辅助：从设置页调用的操作 =====

/** 保存设置并重新生成时间线 */
function saveAndRegenerate() {
  // 重新生成时间线（锚点/偏好/pins可能已变更）
  // 重置 pins 的 used 标记
  (trip.pins||[]).forEach(function(p) { p.used = false; });
  generateTimeline();
  saveTrip();
  switchPage('page-timeline');
}

/** 删除硬约束 */
function removeAnchor(anchorId) {
  trip.anchors = (trip.anchors||[]).filter(function(a) { return a.id !== anchorId; });
  saveTrip();
  renderSettingsPage();
}

/** 添加硬约束（简化版：弹窗输入） */
function addAnchor() {
  var title = prompt('约束名称（如：高铁出发、会议）：');
  if (!title) return;
  var dt = prompt('日期时间（如：2026-07-03T14:00）：');
  if (!dt) return;
  var loc = prompt('地点：') || '';
  var note = prompt('备注：') || '';
  var type = dt.slice(11,13) >= '06' && dt.slice(11,13) < '18' ? 'event' : 'event';
  var id = 'a' + Date.now();
  trip.anchors.push({
    id: id, type: type, icon: '📌', title: title,
    datetime: dt, location: loc, lat: 26.58, lng: 106.71,
    note: note, relatedDay: 0
  });
  saveTrip();
  renderSettingsPage();
}

// ===== 初始化 =====
(function init() {
  // 强制清除旧Service Worker缓存
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
    // 清除缓存
    if (window.caches) {
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
    }
  }

  try {
    loadTrip();
  } catch(e) {
    document.getElementById('timeline').innerHTML = '<div class="card"><p style="color:red;">加载出错: ' + e.message + '</p></div>';
    console.error(e);
  }
  switchPage('page-timeline');

  // 偏好拖拽排序（简化版）
  document.getElementById('prefSort').addEventListener('dragstart', function(e) {
    e.dataTransfer.setData('text/plain', e.target.dataset.idx);
  });
  document.getElementById('prefSort').addEventListener('dragover', function(e) { e.preventDefault(); });
  document.getElementById('prefSort').addEventListener('drop', function(e) {
    e.preventDefault();
    var from = parseInt(e.dataTransfer.getData('text/plain'));
    var toEl = e.target.closest('.sort-item');
    if (!toEl) return;
    var to = parseInt(toEl.dataset.idx);
    if (isNaN(from) || isNaN(to) || from === to) return;
    var moved = trip.preferences.splice(from, 1)[0];
    trip.preferences.splice(to, 0, moved);
    // 更新权重
    trip.preferences.forEach(function(p, i) { p.weight = i + 1; });
    saveTrip();
    renderSettingsPage();
  });
})();

</script>
